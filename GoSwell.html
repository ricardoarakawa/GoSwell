<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GoSwell — Previsão de ondas</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0A0F1E;
    --card: #131A2C;
    --card-2: #1A2238;
    --border: rgba(255,255,255,0.08);
    --text: #EAF0FA;
    --muted: #828FA8;
    /* semantic surface tokens (themeable) */
    --fill: rgba(255,255,255,0.04);
    --hover: rgba(255,255,255,0.07);
    --glass: rgba(10,15,30,0.92);
    --glass-strong: rgba(10,15,30,0.96);
    --panel: rgba(19,26,44,0.95);
    --water: #0B1426;
    --land: #141C30;
    --map-stroke: rgba(8,12,24,0.9);
    --grab: rgba(255,255,255,0.2);
    --switch-off: rgba(255,255,255,0.12);
    --scrollthumb: rgba(255,255,255,0.14);
  }

  /* ===== Light theme ===== */
  html[data-theme="light"] {
    --bg: #F6F8FB;
    --card: #FFFFFF;
    --card-2: #EDF1F7;
    --border: rgba(18,38,68,0.12);
    --text: #11233B;
    --muted: #5B6B82;
    --fill: rgba(18,38,68,0.045);
    --hover: rgba(18,38,68,0.07);
    --glass: rgba(255,255,255,0.80);
    --glass-strong: rgba(255,255,255,0.90);
    --panel: rgba(255,255,255,0.95);
    --water: #DBEAF7;
    --land: #ECF1E9;
    --map-stroke: rgba(255,255,255,0.95);
    --grab: rgba(18,38,68,0.18);
    --switch-off: rgba(18,38,68,0.16);
    --scrollthumb: rgba(18,38,68,0.20);
  }
  html[data-theme="light"] body { background: #E7ECF3; }
  html[data-theme="light"] .gs-phone { box-shadow: 0 0 50px rgba(18,38,68,0.10); }
  html[data-theme="light"] .gs-card { box-shadow: 0 1px 2px rgba(18,38,68,0.05); }
  html[data-theme="light"] .gs-cal-cell.disabled { color: rgba(18,38,68,0.28); }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "DM Sans", system-ui, sans-serif;
    background: #05080F;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; }

  /* ---- phone shell ---- */
  .gs-phone {
    max-width: 440px; margin: 0 auto; height: 100vh; height: 100dvh;
    background: var(--bg); display: flex; flex-direction: column;
    position: relative; overflow: hidden;
    box-shadow: 0 0 60px rgba(0,0,0,0.5);
  }
  .gs-main { flex: 1; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; }
  .gs-main::-webkit-scrollbar { width: 0; }

  /* ---- top header ---- */
  .gs-header {
    display: flex; flex-direction: column; padding: 13px 16px;
    background: var(--glass); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 20; flex-shrink: 0;
  }
  .gs-header-row { display: flex; align-items: center; gap: 10px; }
  /* favorites button + expandable panel */
  .gs-fav-btn { width: 38px; height: 38px; border-radius: 11px; flex-shrink: 0; position: relative;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    border: 1px solid var(--border); background: var(--fill); color: var(--muted); transition: all .15s; }
  .gs-fav-btn:hover { background: var(--hover); color: var(--text); }
  .gs-fav-btn.on { background: rgba(8,160,248,0.12); border-color: rgba(8,160,248,0.45); color: #08A0F8; }
  .gs-fav-count { position: absolute; top: -5px; right: -5px; min-width: 16px; height: 16px; padding: 0 4px;
    border-radius: 999px; background: #F5A623; color: #fff; font-size: 10px; font-weight: 800;
    display: flex; align-items: center; justify-content: center; }
  .gs-fav-panel { margin-top: 12px; display: flex; flex-direction: column; gap: 5px; animation: favDown .22s ease both; }
  @keyframes favDown { from { transform: translateY(-6px); } to { transform: none; } }
  .gs-fav-phead { display: flex; align-items: baseline; justify-content: space-between; padding: 2px 2px 4px; }
  .gs-fav-phead > span:first-child { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; }
  .gs-fav-psub { font-size: 11.5px; color: var(--muted); font-weight: 500; }
  .gs-fav-row { display: flex; align-items: center; gap: 11px; width: 100%; padding: 10px 12px;
    border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text);
    cursor: pointer; font-family: inherit; transition: all .15s; text-align: left; }
  .gs-fav-row:hover { background: var(--hover); border-color: rgba(8,160,248,0.35); }
  .gs-fav-dot { width: 10px; height: 10px; border-radius: 999px; flex-shrink: 0; }
  .gs-fav-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
  .gs-fav-name { font-size: 14px; font-weight: 700; display: inline-flex; align-items: center; gap: 7px; }
  .gs-fav-tag { font-size: 10px; font-weight: 800; color: #08A0F8; background: rgba(8,160,248,0.13); padding: 2px 7px; border-radius: 999px; letter-spacing: 0.2px; }
  .gs-fav-meta { font-size: 11.5px; color: var(--muted); }
  .gs-fav-h { font-size: 14px; font-weight: 700; flex-shrink: 0; }
  .gs-fav-arrow { font-size: 15px; color: var(--muted); flex-shrink: 0; }
  .gs-logo { width: 32px; height: 32px; border-radius: 9px; background: rgba(0,200,150,0.1);
    display: flex; align-items: center; justify-content: center; border: 1px solid rgba(0,200,150,0.2); }
  .gs-search { flex: 1; display: flex; align-items: center; gap: 8px; padding: 8px 12px;
    background: var(--fill); border: 1px solid var(--border); border-radius: 10px; }

  /* ---- bottom nav ---- */
  .gs-bottomnav {
    display: flex; flex-shrink: 0; background: var(--glass-strong); backdrop-filter: blur(12px);
    border-top: 1px solid var(--border); padding: 8px 8px calc(8px + env(safe-area-inset-bottom)); z-index: 20;
  }
  .gs-navbtn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0;
    background: none; border: none; cursor: pointer; padding: 6px 0; transition: color .15s; }
  .gs-nav-badge { position: absolute; top: -6px; right: -8px; min-width: 16px; height: 16px; padding: 0 4px;
    border-radius: 999px; background: #E04040; color: #fff; font-size: 10px; font-weight: 800; line-height: 16px;
    text-align: center; border: 2px solid var(--bg); box-sizing: content-box; }
  .gs-header-av { width: 32px; height: 32px; border-radius: 999px; background: rgba(8,160,248,0.18);
    display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0;
    border: 1px solid var(--border); }

  /* ---- screens ---- */
  .gs-screen { min-height: 100%; }
  .gs-fade { animation: fadeUp .42s cubic-bezier(.22,.7,.3,1); flex: 1 0 auto; min-height: 100%; display: flex; flex-direction: column; }
  @keyframes fadeUp { from { transform: translateY(14px); } to { transform: none; } }

  /* ---- map ---- */
  .gs-screen-map { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .gs-mapwrap { position: relative; flex: 1; min-height: 0; overflow: hidden; background: var(--water); touch-action: none; cursor: grab; }
  .gs-mapwrap:active { cursor: grabbing; }
  .gs-map-svg { user-select: none; width: 100%; height: 100%; display: block; }
  .gs-bizpin { animation: popIn .3s ease; }
  @keyframes popIn { from { transform: scale(.85); } to { transform: scale(1); } }
  .gs-legend { position: absolute; top: 12px; left: 12px; display: flex; flex-direction: column; gap: 6px;
    background: var(--glass); backdrop-filter: blur(8px); padding: 9px 11px; border-radius: 11px; border: 1px solid var(--border); z-index: 5; }
  .gs-zoom { position: absolute; top: 12px; right: 12px; display: flex; flex-direction: column;
    background: var(--panel); border: 1px solid var(--border); border-radius: 11px; overflow: hidden; z-index: 5; }
  .gs-mapcount { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); z-index: 5;
    background: var(--panel); border: 1px solid var(--border); border-radius: 999px;
    padding: 8px 16px; font-size: 12.5px; font-weight: 600; color: var(--text); white-space: nowrap; }
  .gs-map-notif { position: absolute; bottom: 14px; left: 12px; right: 12px; z-index: 6; display: flex;
    align-items: center; gap: 10px; padding: 11px 14px; border-radius: 14px; cursor: pointer; text-align: left;
    background: var(--panel); border: 1px solid rgba(8,160,248,0.4); color: var(--text);
    font-family: inherit; font-size: 13px; font-weight: 600; box-shadow: 0 8px 28px rgba(0,0,0,0.45); }
  .gs-map-notif > span:nth-child(2) { flex: 1; }
  .gs-map-notif-ic { position: relative; font-size: 18px; }
  .gs-weatherrow { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap;
    margin-top: 14px; padding: 10px 12px; background: var(--fill); border: 1px solid var(--border); border-radius: 13px; }
  .gs-zoom button { width: 38px; height: 38px; background: none; border: none; color: var(--text);
    font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .gs-zoom button:hover { background: var(--hover); }
  .gs-zoomdiv { height: 1px; background: var(--border); }
  .gs-bizhint { position: absolute; bottom: 56px; left: 50%; transform: translateX(-50%);
    background: var(--panel); border: 1px solid var(--border); border-radius: 999px;
    padding: 7px 14px; font-size: 12px; color: var(--muted); white-space: nowrap; animation: fadeUp .3s; }

  /* peak detail card */
  .gs-peakcard { position: absolute; left: 10px; right: 10px; bottom: 10px;
    background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 16px 16px 18px;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.55); animation: cardUp .32s cubic-bezier(.22,.8,.3,1); z-index: 10; }
  @keyframes cardUp { from { transform: translateY(40px); } to { transform: none; } }
  .gs-grabber { width: 38px; height: 4px; border-radius: 999px; background: var(--grab); margin: -4px auto 12px; }
  .gs-close { width: 28px; height: 28px; border-radius: 999px; background: var(--hover);
    border: none; color: var(--muted); cursor: pointer; font-size: 13px; }
  .gs-close:hover { background: rgba(255,255,255,0.12); }
  .gs-statgrid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-top: 16px; }
  .gs-statbox { background: var(--fill); border: 1px solid var(--border); border-radius: 13px; padding: 11px 12px; }
  .gs-dirgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
  .gs-dircard { background: var(--fill); border: 1px solid var(--border); border-radius: 14px; padding: 12px; }
  .gs-dirhead { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .gs-dirhead > span:first-child { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; }

  /* peak list */
  .gs-list { padding: 16px 14px 24px; }
  .gs-list-title { display: flex; justify-content: space-between; align-items: center; font-size: 14px;
    font-weight: 700; margin-bottom: 10px; padding: 0 2px; }
  .gs-peakrow { display: flex; align-items: center; gap: 12px; width: 100%; padding: 13px 12px;
    background: var(--card); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 8px;
    cursor: pointer; transition: background .15s, transform .1s; }
  .gs-peakrow:hover { background: var(--card-2); }
  .gs-peakrow:active { transform: scale(.99); }

  /* ---- forecast ---- */
  .gs-fc-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px;
    border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--glass);
    backdrop-filter: blur(12px); z-index: 15; }
  .gs-back { width: 36px; height: 36px; border-radius: 10px; background: var(--fill);
    border: 1px solid var(--border); color: var(--text); font-size: 18px; cursor: pointer; flex-shrink: 0; }
  .gs-back:hover { background: rgba(255,255,255,0.1); }
  /* expandable peak switcher */
  .gs-peakswitch { display: inline-flex; align-items: center; gap: 7px; background: none; border: none; padding: 0;
    cursor: pointer; color: var(--text); font-family: inherit; max-width: 100%; }
  .gs-peakswitch-chev { width: 28px; height: 28px; border-radius: 9px; display: inline-flex; align-items: center;
    justify-content: center; background: rgba(8,160,248,0.12); color: #08A0F8; transition: transform .2s, background .15s; }
  .gs-peakswitch:hover .gs-peakswitch-chev { background: rgba(8,160,248,0.2); }
  .gs-peakswitch-chev.open { transform: rotate(180deg); }
  .gs-peaklist-pop { position: sticky; top: 65px; z-index: 14; margin: 0 12px; padding: 6px;
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    box-shadow: 0 14px 40px rgba(0,0,0,0.5); animation: popDown .2s ease; }
  @keyframes popDown { from { transform: translateY(-6px); } to { transform: none; } }
  .gs-peaklist-head { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.5px;
    text-transform: uppercase; padding: 8px 10px 6px; }
  .gs-peaklist-row { display: flex; align-items: center; gap: 11px; width: 100%; padding: 10px 11px;
    background: none; border: none; border-radius: 11px; cursor: pointer; font-family: inherit; color: var(--text); transition: background .12s; }
  .gs-peaklist-row:hover { background: var(--fill); }
  .gs-peaklist-row.active { background: rgba(8,160,248,0.1); }
  .gs-peaklist-check { color: #08A0F8; font-weight: 700; font-size: 13px; flex-shrink: 0; }
  /* "Próximos 15 dias" header + best-season text button */
  .gs-15-head { display: flex; align-items: center; justify-content: space-between; }
  .gs-season-btn { display: inline-flex; align-items: center; gap: 6px; background: none; border: none;
    color: #08A0F8; font-family: inherit; font-size: 12.5px; font-weight: 700; cursor: pointer; padding: 4px 2px; }
  .gs-season-btn:hover { color: #3DB8FF; }
  /* season screen */
  .gs-season-hero { position: relative; overflow: hidden; background: var(--card);
    border: 1px solid var(--border); border-radius: 16px; padding: 15px 16px 15px 20px;
    box-shadow: 0 1px 2px rgba(18,38,68,0.04); }
  .gs-season-hero::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    background: linear-gradient(180deg,#00C896,#08A0F8); }
  .gs-season-hero-eyebrow { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; }
  .gs-season-hero-main { display: flex; align-items: center; gap: 13px; margin-top: 11px; }
  .gs-season-hero-ic { width: 46px; height: 46px; border-radius: 13px; flex-shrink: 0; display: flex;
    align-items: center; justify-content: center; font-size: 26px; background: rgba(0,200,150,0.12); }
  .gs-season-hero-title { font-size: 22px; font-weight: 800; letter-spacing: -0.4px; color: var(--text); line-height: 1.1; }
  .gs-season-hero-meta { font-size: 12.5px; color: var(--muted); margin-top: 3px; }
  .gs-season-hero-rating { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .gs-season-hero-score { font-size: 12px; font-weight: 700; color: var(--muted); }
  .gs-season-rec { background: rgba(8,160,248,0.07); border: 1px solid rgba(8,160,248,0.25); border-radius: 14px; padding: 14px; }
  .gs-season-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 14px; }
  .gs-season-best { font-size: 10.5px; font-weight: 800; color: #00C896; background: rgba(0,200,150,0.14);
    padding: 3px 9px; border-radius: 999px; letter-spacing: 0.3px; }
  .gs-season-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 11px; }
  .gs-season-stats > div { background: var(--fill); border: 1px solid var(--border); border-radius: 11px;
    padding: 8px 10px; display: flex; flex-direction: column; gap: 2px; }
  .gs-ss-k { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
  .gs-ss-v { font-size: 14.5px; font-weight: 700; }
  .gs-season-level { font-size: 11px; font-weight: 700; color: #08A0F8; background: rgba(8,160,248,0.13);
    padding: 3px 9px; border-radius: 999px; }
  .gs-season-foryou { font-size: 11px; font-weight: 700; color: #00C896; background: rgba(0,200,150,0.13);
    padding: 3px 9px; border-radius: 999px; }
  .gs-fc-body { padding: 16px 0 28px; display: flex; flex-direction: column; gap: 8px; }
  /* floating action button */
  .gs-fab-dock { position: sticky; bottom: 0; z-index: 30; display: flex; justify-content: flex-end;
    padding: 14px 16px calc(26px + env(safe-area-inset-bottom)); pointer-events: none;
    background: linear-gradient(to top, var(--bg) 50%, rgba(10,15,30,0)); margin-top: -28px; }
  .gs-fab { pointer-events: auto; display: inline-flex; align-items: center; gap: 9px;
    padding: 14px 20px; border: none; border-radius: 999px; cursor: pointer; font-family: inherit;
    font-size: 14.5px; font-weight: 700; color: #fff; letter-spacing: 0.1px;
    background: #08A0F8;
    box-shadow: 0 8px 24px rgba(8,160,248,0.34), 0 2px 8px rgba(0,0,0,0.4);
    transition: transform .12s ease, box-shadow .12s ease; }
  .gs-fab:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(8,160,248,0.42), 0 3px 10px rgba(0,0,0,0.45); }
  .gs-fab:active { transform: translateY(0) scale(.97); }
  .gs-fab svg { display: block; }
  .gs-daycols { display: flex; gap: 9px; overflow-x: auto; padding: 6px 16px 12px; scroll-snap-type: x mandatory; }
  .gs-daycols::-webkit-scrollbar { height: 5px; }
  .gs-daycols::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 999px; }
  .gs-daycol { flex-shrink: 0; width: 84px; border: 1.5px solid var(--border); border-radius: 14px;
    padding: 11px 8px 12px; cursor: pointer; text-align: center; scroll-snap-align: center; transition: all .18s; }
  .gs-daycol:hover { background: var(--fill); }

  .gs-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; }
  .gs-pad { padding: 14px; }
  .gs-blocktitle { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 12px; letter-spacing: 0.2px; }
  .gs-hourly { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 6px; scroll-snap-type: x proximity; cursor: grab; }
  .gs-hourly:active { cursor: grabbing; }
  .gs-hourly::-webkit-scrollbar { height: 5px; }
  .gs-hourly::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.14); border-radius: 999px; }
  .gs-hourcell { flex: 0 0 auto; width: 46px; text-align: center; padding: 7px 2px; border-radius: 10px; border: 1px solid transparent; scroll-snap-align: start; }
  .gs-barscroll { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 2px; cursor: grab; }
  .gs-barscroll:active { cursor: grabbing; }
  .gs-barscroll::-webkit-scrollbar { height: 5px; }
  .gs-barscroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.14); border-radius: 999px; }
  .gs-tide { display: flex; align-items: flex-end; gap: 2px; height: 70px; padding-top: 4px; }

  /* ---- businesses ---- */
  .gs-bizicon { width: 46px; height: 46px; border-radius: 13px; background: var(--card-2);
    display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }

  /* ---- trips ---- */
  .gs-page-header { display: flex; justify-content: space-between; align-items: center; padding: 18px 16px 14px; }
  .gs-newtrip { background: #08A0F8; color: #fff; border: none;
    padding: 9px 15px; border-radius: 11px; font-weight: 600; font-size: 13.5px; cursor: pointer; }
  .gs-newtrip:hover { filter: brightness(1.07); }
  .gs-chat { margin-top: 12px; display: flex; flex-direction: column; gap: 7px; padding: 11px;
    background: var(--fill); border-radius: 12px; border: 1px solid var(--border); }
  .gs-cta-card { display: flex; justify-content: space-between; align-items: center; width: 100%;
    background: rgba(8,160,248,0.07); border: 1px dashed rgba(8,160,248,0.4); border-radius: 16px;
    padding: 16px; cursor: pointer; text-align: left; transition: background .15s; }
  .gs-cta-card:hover { background: rgba(8,160,248,0.12); }

  /* ---- perfil ---- */
  .gs-profile-hero { background: linear-gradient(150deg,#08A0F8 0%,#1A4F9E 45%,#0A2A4A 100%); color: #fff;
    padding: 28px 20px 40px; text-align: center; display: flex; flex-direction: column; align-items: center; }

  /* ---- appearance (theme) selector ---- */
  .gs-theme-seg { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .gs-theme-opt { display: flex; flex-direction: column; align-items: center; gap: 9px; padding: 15px 12px;
    border: 1.5px solid var(--border); border-radius: 14px; background: var(--fill); color: var(--muted);
    font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer; transition: all .15s; }
  .gs-theme-ic { width: 34px; height: 34px; border-radius: 999px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .gs-theme-opt.on { border-color: #08A0F8; background: rgba(8,160,248,0.1); color: var(--text); }
  .gs-theme-opt:hover:not(.on) { border-color: rgba(8,160,248,0.4); }
  .gs-profile-av { width: 78px; height: 78px; border-radius: 999px; background: rgba(255,255,255,0.15);
